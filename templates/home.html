{% extends "base.html" %}

{% block content %}

<div class="row row-cols-1 row-cols-md-3 g-4">
    {% for item in menu_items %}
  <div class="col">
    <div class="card h-100">
      <img src="{{ item.image.url }}" class="card-img-top" alt="..." width="350" height="350">
      <div class="card-body">
        <h5 class="card-title">{{ item.name }}</h5>-Rs.{{ item.price }}
        <p class="card-text">{{ item.description }}</p>
      </div>
    </div>
  </div>
  {% endfor %}

</div>
{% endblock content %}
