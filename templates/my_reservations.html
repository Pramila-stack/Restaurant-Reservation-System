{% extends "base.html" %}

{% block content %}
<div class="container mt-5">
    <h2 class="mb-4 text-center">My Reservations</h2>

    <div class="table-responsive">
        <table class="table table-striped table-hover table-bordered align-middle">
            <thead class="table-dark text-center">
                <tr>
                    <th scope="col">Table</th>
                    <th scope="col">Date</th>
                    <th scope="col">Time</th>
                </tr>
            </thead>
            <tbody class="text-center">
                {% for r in reservations %}
                <tr>
                    <td>{{ r.table.number }}</td>
                    <td>{{ r.reservation_date|date:"D, M d, Y" }}</td>
                    <td>{{ r.reservation_time|time:"H:i" }}</td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="3" class="text-muted">You have no reservations yet.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>

    <div class="text-center mt-3">
        <a href="{% url 'home' %}" class="btn btn-outline-primary btn-lg">Go Back</a>
    </div>
</div>
{% endblock content %}
